<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link id="favicon" rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-png">
  <title>Page Not Found | Kailash</title>
</head>
<body>

  <!-- SVG Gradients Definitions for Icons -->
  <svg style="width:0; height:0; position:absolute;" aria-hidden="true">
    <defs>
      <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="var(--accent-primary)" />
        <stop offset="100%" stop-color="var(--accent-secondary)" />
      </linearGradient>
    </defs>
  </svg>

  <!-- NAVIGATION HEADER -->
  <header>
    <a href="/" class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Kailash
    </a>
    
    <button class="menu-btn" id="menu-btn" aria-label="Toggle menu">☰</button>

    <nav class="navbar">
      <ul>
        <li><a href="/#home">Home</a></li>
        <li><a href="/#about">About</a></li>
        <li><a href="/#skills">Skills</a></li>
        <li><a href="/#experience">Experience</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/#publications">Publications</a></li>
        <li><a href="/#contact">Contact</a></li>
      </ul>
    </nav>

    <div class="nav-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Light/Dark Theme">
        <!-- Sun Icon -->
        <svg class="sun-icon" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/></svg>
        <!-- Moon Icon -->
        <svg class="moon-icon" viewBox="0 0 24 24"><path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.6-.1 1.2.3 1.3.9.1.6-.2 1.2-.8 1.4-3.4 1-5.7 4.1-5.7 7.6 0 4.4 3.6 8 8 8 3.5 0 6.6-2.3 7.6-5.7.2-.6.8-.9 1.4-.8.6.1 1 .7.9 1.3-.9 4.7-5 8.1-9.8 8.1z"/></svg>
      </button>
    </div>
  </header>

  <!-- 404 CONTENT -->
  <section style="min-height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-top: 150px;">
    <h1 style="font-size: 8rem; font-family: var(--font-heading); background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 20px;">404</h1>
    <h2 style="font-size: 2rem; margin-bottom: 15px; font-family: var(--font-heading); font-weight: 700;">Looks like you're lost</h2>
    <p style="color: var(--text-secondary); max-width: 500px; margin-bottom: 35px; font-size: 1.05rem;">The page you are looking for is not available or has been moved.</p>
    <a href="/" class="btn-primary">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;margin-right:8px;transform:scaleX(-1);"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21 12l-8.15-8.15-1.42 1.42L16.86 11H5v2z"/></svg>
      Back to Home
    </a>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Kailash's Portfolio
    </div>
    <div class="footer-credits">
      © 2026 Kailash Narayan Kiradu A. All rights reserved.
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Theme toggler logic
      const themeToggleBtn = document.getElementById('theme-toggle');
      const currentTheme = localStorage.getItem('theme');
      if (currentTheme === 'dark') {
        document.body.classList.add('dark-theme');
      }
      themeToggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        const theme = document.body.classList.contains('dark-theme') ? 'dark' : 'light';
        localStorage.setItem('theme', theme);
      });

      // Mobile Menu hamburger toggler logic
      const menuBtn = document.getElementById('menu-btn');
      const navbar = document.querySelector('.navbar');
      menuBtn.addEventListener('click', () => {
        navbar.classList.toggle('active');
      });
    });
  </script>
</body>
</html>
